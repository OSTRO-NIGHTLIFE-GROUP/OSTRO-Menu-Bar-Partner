<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Digital Menu</title>
    <link rel="stylesheet" href="style.css" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#111111" />
  </head>

  <body>
    <header>OSTRO Restaurant & Bar 24/7</header>

    <!-- <div class="categories" id="categories">
      <button class="active" onclick="showMenu('Breakfast', this)">
        OSTRO Porridge
      </button>
      <button onclick="showMenu('Featured Food', this)">Salad Selection</button>
      <button onclick="showMenu('Snack & Appetizers', this)">
        Main Courses
      </button>
    </div> -->

    <!-- Breakfast Section -->
    <div class="menu-image breakfast active">
      <img
        src="images/front-cover.webp"
        loading="lazy"
        alt="Salad Selection Menu 1"
      />
      <img
        src="images/ostro-porridge (1).webp"
        loading="lazy"
        alt="Breakfast Menu 1"
      />
      <img
        src="images/ostro-porridge (2).webp"
        loading="lazy"
        alt="Breakfast Menu 2"
      />
      <img
        src="images/ostro-porridge (3).webp"
        loading="lazy"
        alt="Breakfast Menu 3"
      />
      <img
        src="images/salad-selection(1).webp"
        loading="lazy"
        alt="Featured Food Menu"
      />
      <img
        src="images/salad-selection(2).webp"
        loading="lazy"
        alt="Snack & Appetizers Menu 1"
      />
      <img
        src="images/main-course.webp"
        loading="lazy"
        alt="Salad Selection Menu 1"
      />
      <img
        src="images/back-cover.webp"
        loading="lazy"
        alt="Salad Selection Menu 1"
      />
    </div>

    <!-- Ended -->
    <script>
      // Enable mouse drag scrolling for categories
      const categoriesContainer = document.getElementById("categories");
      let isDown = false;
      let startX;
      let scrollLeft;

      categoriesContainer.addEventListener("mousedown", (e) => {
        isDown = true;
        categoriesContainer.style.cursor = "grabbing";
        startX = e.pageX - categoriesContainer.offsetLeft;
        scrollLeft = categoriesContainer.scrollLeft;
      });

      categoriesContainer.addEventListener("mouseleave", () => {
        isDown = false;
        categoriesContainer.style.cursor = "grab";
      });

      categoriesContainer.addEventListener("mouseup", () => {
        isDown = false;
        categoriesContainer.style.cursor = "grab";
      });

      categoriesContainer.addEventListener("mousemove", (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - categoriesContainer.offsetLeft;
        const walk = (x - startX) * 2; // Scroll speed multiplier
        categoriesContainer.scrollLeft = scrollLeft - walk;
      });

      function showMenu(category, button) {
        document.querySelectorAll(".menu-image").forEach((section) => {
          section.classList.remove("active");
        });

        document.querySelectorAll(".categories button").forEach((btn) => {
          btn.classList.remove("active");
        });

        // Convert category name to valid CSS class
        const className = category.toLowerCase().replace(/[^a-z0-9]/g, "-");
        const menuSection = document.querySelector(".menu-image." + className);
        if (menuSection) {
          menuSection.classList.add("active");
        }
        button.classList.add("active");
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
